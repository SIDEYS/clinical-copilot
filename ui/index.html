<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicalCopilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .spinner { border: 3px solid #e5e7eb; border-top-color: #ef4444; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    details > summary { cursor: pointer; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <div class="max-w-4xl mx-auto px-4 py-10">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">ClinicalCopilot <span class="text-red-500">🏥</span></h1>
      <p class="text-gray-500 mt-1">Multi-agent AI chart summarizer · 5 parallel agents · W&B Weave audit trail</p>
    </div>

    <!-- Input -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Paste Clinical Chart</label>
      <textarea id="chartInput" rows="10"
        class="w-full border border-gray-300 rounded-lg p-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-red-400 resize-y"
        placeholder="Paste raw, unstructured clinical notes here..."></textarea>
      <div class="flex items-center gap-4 mt-4">
        <input id="patientId" type="text" value="DEMO-001"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-36 focus:outline-none focus:ring-2 focus:ring-red-400"
          placeholder="Patient ID" />
        <button onclick="analyze()"
          class="bg-red-500 hover:bg-red-600 text-white font-semibold px-6 py-2 rounded-lg transition-colors">
          Analyze Chart
        </button>
        <div id="spinner" class="spinner hidden"></div>
        <span id="statusMsg" class="text-sm text-gray-500"></span>
      </div>
    </div>

    <!-- Results -->
    <div id="results" class="hidden space-y-5">

      <!-- Red Flags -->
      <div class="bg-white rounded-xl shadow-sm border border-red-200 p-6">
        <h2 class="text-lg font-bold text-red-600 mb-3">🚨 Red Flags</h2>
        <div id="redFlagsContainer" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Summary -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-2">Executive Summary</h2>
        <p id="summaryText" class="text-gray-700 text-sm"></p>
      </div>

      <!-- SOAP Note -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4">SOAP Note</h2>
        <div class="space-y-3" id="soapContainer"></div>
      </div>

      <!-- Medications -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-3">💊 Medications</h2>
        <div id="medsContainer"></div>
      </div>

      <!-- Timeline -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-3">📅 Medical Timeline</h2>
        <ul id="timelineContainer" class="space-y-2"></ul>
      </div>

      <!-- Weave Link -->
      <div class="bg-gray-50 rounded-xl border border-gray-200 p-4 flex items-center justify-between">
        <span class="text-sm text-gray-600">W&B Weave audit trail</span>
        <a id="weaveLink" href="#" target="_blank"
          class="text-sm font-semibold text-blue-600 hover:underline">View W&B Weave Trace →</a>
      </div>
    </div>
  </div>

  <script>
    const SEVERITY_COLORS = {
      HIGH: "bg-red-100 text-red-800 border border-red-300",
      MEDIUM: "bg-amber-100 text-amber-800 border border-amber-300",
      LOW: "bg-green-100 text-green-800 border border-green-300",
    };

    async function analyze() {
      const text = document.getElementById("chartInput").value.trim();
      const patientId = document.getElementById("patientId").value.trim() || "DEMO-001";
      if (!text) { alert("Please paste a clinical chart."); return; }

      document.getElementById("spinner").classList.remove("hidden");
      document.getElementById("results").classList.add("hidden");
      document.getElementById("statusMsg").textContent = "Running 5 agents...";

      try {
        const res = await fetch("http://localhost:8000/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, patient_id: patientId }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Server error");
        }
        const data = await res.json();
        renderResults(data);
      } catch (e) {
        document.getElementById("statusMsg").textContent = "Error: " + e.message;
      } finally {
        document.getElementById("spinner").classList.add("hidden");
      }
    }

    function renderResults(data) {
      // Red flags
      const rfContainer = document.getElementById("redFlagsContainer");
      rfContainer.innerHTML = "";
      const allFlags = [
        ...data.red_flags.map(f => ({ flag: f, severity: "HIGH" })),
        ...data.risk_flags.filter(f => !data.red_flags.includes(f.flag))
      ];
      if (allFlags.length === 0) {
        rfContainer.innerHTML = '<span class="text-gray-500 text-sm">No red flags detected.</span>';
      } else {
        allFlags.forEach(f => {
          const badge = document.createElement("span");
          const sev = f.severity || "HIGH";
          badge.className = `px-3 py-1 rounded-full text-xs font-semibold ${SEVERITY_COLORS[sev] || SEVERITY_COLORS.HIGH}`;
          badge.textContent = typeof f === "string" ? f : f.flag;
          rfContainer.appendChild(badge);
        });
      }

      // Summary
      document.getElementById("summaryText").textContent = data.summary || "—";

      // SOAP
      const soap = data.soap_note || {};
      const soapContainer = document.getElementById("soapContainer");
      soapContainer.innerHTML = "";
      [["Subjective", soap.subjective], ["Objective", soap.objective],
       ["Assessment", soap.assessment], ["Plan", soap.plan]].forEach(([label, content]) => {
        soapContainer.innerHTML += `
          <details open class="border border-gray-200 rounded-lg">
            <summary class="px-4 py-3 font-semibold text-gray-700 bg-gray-50 rounded-lg">${label}</summary>
            <div class="px-4 py-3 text-sm text-gray-700 whitespace-pre-wrap">${content || "—"}</div>
          </details>`;
      });

      // Medications
      const medsContainer = document.getElementById("medsContainer");
      if (!data.medications || data.medications.length === 0) {
        medsContainer.innerHTML = '<p class="text-gray-500 text-sm">None extracted.</p>';
      } else {
        let html = '<table class="w-full text-sm border-collapse"><thead><tr class="bg-gray-50"><th class="text-left p-2 border border-gray-200">Drug</th><th class="text-left p-2 border border-gray-200">Dose</th><th class="text-left p-2 border border-gray-200">Frequency</th></tr></thead><tbody>';
        data.medications.forEach(m => {
          html += `<tr><td class="p-2 border border-gray-200 font-medium">${m.name}</td><td class="p-2 border border-gray-200">${m.dose || "—"}</td><td class="p-2 border border-gray-200">${m.frequency || "—"}</td></tr>`;
        });
        html += "</tbody></table>";
        if (data.interactions && data.interactions.length > 0) {
          html += '<div class="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg"><p class="text-xs font-bold text-amber-800 mb-1">⚠️ Drug Interactions</p>';
          data.interactions.forEach(i => {
            html += `<p class="text-xs text-amber-700"><strong>${i.drug}:</strong> ${i.warnings}</p>`;
          });
          html += "</div>";
        }
        medsContainer.innerHTML = html;
      }

      // Timeline
      const tlContainer = document.getElementById("timelineContainer");
      tlContainer.innerHTML = "";
      if (!data.timeline_events || data.timeline_events.length === 0) {
        tlContainer.innerHTML = '<li class="text-gray-500 text-sm">No timeline events extracted.</li>';
      } else {
        data.timeline_events.forEach(e => {
          tlContainer.innerHTML += `<li class="flex gap-3 text-sm"><span class="text-gray-400 w-28 shrink-0">${e.date}</span><span class="text-gray-700">${e.event} <span class="text-xs text-gray-400">(${e.category})</span></span></li>`;
        });
      }

      // Weave link
      document.getElementById("weaveLink").href = data.weave_url || "#";

      document.getElementById("results").classList.remove("hidden");
      document.getElementById("statusMsg").textContent = `trace_id: ${data.trace_id}`;
    }
  </script>
</body>
</html>
